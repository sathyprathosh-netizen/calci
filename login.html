<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HR Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />

    <!-- Firebase Auth SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>
        <div class="blob blob-6"></div>
    </div>

    <div class="container login-container split-login-container">

        <!-- TWO COLUMN LOGIN CARD -->
        <div class="login-card split-login-card">

            <!-- LEFT SIDE: Info & Welcome -->
            <div class="login-side-left">
                <div class="login-left-content">
                    <span class="portal-badge badge-light">Internal HR Portal</span>
                    <h2 class="welcome-title">Welcome Back!</h2>
                    <p class="welcome-subtext">Access your intern's income calculations, milestone tracking, and bonus
                        reports in one place.</p>

                    <div class="feature-list">
                        <div class="feature-item">
                            <span class="feature-icon material-symbols-rounded">payments</span>
                            <span>Automated Stipend Calculation</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon material-symbols-rounded">trending_up</span>
                            <span>Revenue & Business Goals</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon material-symbols-rounded">cloud_sync</span>
                            <span>Real-Time Cloud Sync</span>
                        </div>
                    </div>

                    <!-- Theme Switcher -->
                    <div class="login-theme-switcher">
                        <button class="login-theme-btn" data-theme="classic" title="Classic">
                            <span class="bg-classic"></span>
                        </button>
                        <button class="login-theme-btn" data-theme="ocean" title="Emerald">
                            <span class="bg-ocean"></span>
                        </button>
                        <button class="login-theme-btn" data-theme="gradient" title="Vibrant">
                            <span class="bg-gradient"></span>
                        </button>
                        <button class="login-theme-btn" data-theme="aurora" title="Aurora">
                            <span class="bg-aurora"></span>
                        </button>
                        <button class="login-theme-btn" data-theme="midnight" title="Midnight Rose">
                            <span class="bg-midnight"></span>
                        </button>
                    </div>
                </div>

                <!-- Optional decorative element or image space at the bottom -->
            </div>

            <!-- RIGHT SIDE: Auth Form -->
            <div class="login-side-right">
                <div class="login-header">
                    <h2>Sign In</h2>
                    <p>Enter your details to access your account.</p>
                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" id="signinTab">Sign In</button>
                    <button class="auth-tab" id="signupTab">Create Account</button>
                </div>

                <!-- Sign In Form -->
                <form id="signinForm" class="login-form">
                    <div class="form-group">
                        <label for="signinEmail">Email Address</label>
                        <div class="input-with-icon">
                            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                            <input type="email" id="signinEmail" placeholder="staff@fortumars.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signinPassword">Password</label>
                        <div class="input-with-icon">
                            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                            <input type="password" id="signinPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div id="signinError" class="error-text"></div>
                    <button type="submit" class="login-btn">Sign In To Portal</button>
                </form>

                <!-- Sign Up Form -->
                <form id="signupForm" class="login-form hidden">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <div class="input-with-icon">
                            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <input type="text" id="signupName" placeholder="Enter your full name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <div class="input-with-icon">
                            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                            <input type="email" id="signupEmail" placeholder="staff@fortumars.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <div class="input-with-icon">
                            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                            <input type="password" id="signupPassword" placeholder="Min. 6 characters" required>
                        </div>
                    </div>
                    <div id="signupError" class="error-text"></div>
                    <button type="submit" class="login-btn">Create Account</button>
                </form>
            </div>

        </div>
    </div>

    <script src="login.js"></script>
    <script>
        const savedTheme = localStorage.getItem('calculator-theme') || 'classic';
        document.body.setAttribute('data-theme', savedTheme);

        // Mark active theme button
        document.querySelectorAll('.login-theme-btn').forEach(btn => {
            if (btn.dataset.theme === savedTheme) btn.classList.add('active');

            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('calculator-theme', theme);
                document.querySelectorAll('.login-theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>

</html>
